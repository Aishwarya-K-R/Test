global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'auth-service'
    static_configs:
      - targets: ['auth-service:4005']

  - job_name: 'patient-service'
    static_configs:
      - targets: ['patient-service:5244']
  
  - job_name: 'ai-service'
    static_configs:
      - targets: ['ai-service:5000']

  - job_name: 'gateway'
    static_configs:
      - targets: ['api-gateway:4004']