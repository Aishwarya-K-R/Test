name: AI Issue Fix Agent

on:
  issues:
    types: [labeled]

permissions:
  contents: write        # create branch + commit fix
  pull-requests: write   # raise fix PR
  issues: write          # comment on issue

jobs:
  fix-issue:
    name: PMS AI Fix Agent
    runs-on: ubuntu-latest
    # Only trigger for bug label, skip bot-created issues
    if: github.event.label.name == 'bug' && github.event.issue.user.login != 'github-actions[bot]'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install openai requests

      - name: Run Issue Fix Agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_MODELS_TOKEN: ${{ secrets.GH_MODELS_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          REPO_FULL_NAME: ${{ github.repository }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: python .github/scripts/issue_fix_agent.py
